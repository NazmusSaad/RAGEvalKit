name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        # Installs all declared dependencies (chromadb, sentence-transformers, openai, etc.)
        # None of these are invoked by the test suite — tests use DummyEmbedder and
        # MockLLMClient exclusively. OPENAI_API_KEY is intentionally not set.
        run: pip install -e ".[dev]"

      - name: Verify CLI loads
        run: rageval --help

      - name: Run test suite
        run: python -m pytest --tb=short -q
        # No OPENAI_API_KEY is set. No real API calls are made. No models are downloaded.
        # All 700+ tests use DummyEmbedder (SHA-256 deterministic) and MockLLMClient.
