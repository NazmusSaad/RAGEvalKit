version: 1
name: experiment
seed: 42

corpus:
  path: ./docs
  glob: "**/*.{md,pdf,txt}"

chunking:
  strategy: recursive
  chunk_size: 256
  chunk_overlap: 32

embedding:
  provider: sentence_transformers
  model: BAAI/bge-small-en-v1.5
  batch_size: 64

vector_store:
  type: chroma
  path: .rageval/chroma
  collection: docs_v1
  distance: cosine

retrieval:
  top_k: 3
  rerank: null
  filter: null

generation:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 512
  system_prompt_path: prompts/system.txt
  prompt_template_path: prompts/rag.j2

judge:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_concurrent: 4

evaluators:
  - retrieval_relevance
  - groundedness
  - answer_relevance

evalset:
  path: evalsets/v1.jsonl

cost:
  input_per_1k: 0.015
  output_per_1k: 0.060
